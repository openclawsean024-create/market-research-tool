<html lang="zh-TW">
<head>

    <title>市場研究論壇 - Market Research Forum</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0071e3;
            --accent: #34c759;
            --danger: #ff3b30;
            --warning: #ff9500;
            --purple: #af52de;
            --text: #1d1d1f;
            --text2: #86868b;
            --bg: #f5f5f7;
            --card: #fff;
            --border: #d2d2d7;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 20px;
        }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        a { text-decoration: none; color: inherit; }

        /* Header */
        .topbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .topbar-actions { display: flex; gap: 12px; }
        .topbar-btn { padding: 8px 16px; border-radius: 20px; border: 2px solid var(--border); background: var(--card); font-size: 14px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .topbar-btn:hover { border-color: var(--primary); color: var(--primary); }
        .topbar-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Container */
        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

        /* Views */
        .view { display: none; }
        .view.active { display: block; }

        /* ─── Home: Hero + Filter ─── */
        .hero { text-align: center; padding: 40px 0 32px; }
        .hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .hero p { color: var(--text2); font-size: 16px; }

        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
        .filter-tag { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); background: var(--card); font-size: 13px; cursor: pointer; transition: 0.2s; }
        .filter-tag:hover { border-color: var(--primary); }
        .filter-tag.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .filter-search { flex: 1; min-width: 200px; padding: 8px 16px; border: 2px solid var(--border); border-radius: 20px; font-size: 14px; background: var(--card); }
        .filter-search:focus { outline: none; border-color: var(--primary); }

        /* ─── News Card Grid ─── */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .news-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .news-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
        .news-card-img { width: 100%; height: 180px; object-fit: cover; background: linear-gradient(135deg, #667eea22, #764ba222); display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .news-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .news-card-body { padding: 20px; }
        .news-card-meta { display: flex; gap: 12px; margin-bottom: 10px; }
        .news-card-tag { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .news-card-tag.tech { background: #0071e322; color: var(--primary); }
        .news-card-tag.product { background: #af52de22; color: var(--purple); }
        .news-card-tag.market { background: #34c75922; color: var(--accent); }
        .news-card-tag.trend { background: #ff950022; color: var(--warning); }
        .news-card-date { font-size: 12px; color: var(--text2); }
        .news-card-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
        .news-card-summary { font-size: 14px; color: var(--text2); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .news-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
        .news-card-source { font-size: 12px; color: var(--text2); }
        .news-card-readmore { font-size: 13px; color: var(--primary); font-weight: 600; }

        /* ─── Detail View ─── */
        .detail-header { margin-bottom: 24px; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 20px; border: 2px solid var(--border); background: var(--card); font-size: 14px; cursor: pointer; transition: 0.2s; margin-bottom: 20px; }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); }
        .detail-hero-img { width: 100%; height: 360px; object-fit: cover; border-radius: var(--radius); margin-bottom: 24px; background: linear-gradient(135deg, #667eea22, #764ba222); display: flex; align-items: center; justify-content: center; font-size: 80px; }
        .detail-hero-img img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); }
        .detail-title { font-size: 28px; font-weight: 700; line-height: 1.3; margin-bottom: 16px; }
        .detail-meta { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .detail-date, .detail-source, .detail-author { font-size: 14px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
        .detail-body { font-size: 16px; line-height: 1.8; color: var(--text); }
        .detail-body p { margin-bottom: 16px; }
        .detail-body h2 { font-size: 20px; font-weight: 700; margin: 24px 0 12px; }
        .detail-body ul { padding-left: 24px; margin-bottom: 16px; }
        .detail-body li { margin-bottom: 8px; }
        .detail-body blockquote { border-left: 4px solid var(--primary); padding: 12px 20px; background: var(--bg); border-radius: 0 12px 12px 0; margin: 16px 0; font-style: italic; color: var(--text2); }
        .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 32px; }
        .detail-tag { padding: 6px 14px; border-radius: 20px; background: var(--bg); font-size: 13px; color: var(--text2); }

        /* ─── Add News Modal ─── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 22px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text2); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .modal-btn.cancel { background: var(--bg); color: var(--text); }
        .modal-btn.submit { background: var(--primary); color: #fff; }
        .modal-btn.delete { background: var(--danger); color: #fff; }

        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
        .empty-state .emoji { font-size: 64px; margin-bottom: 16px; }

        /* Toast */
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff; padding: 14px 24px; border-radius: 12px; font-size: 14px; z-index: 300; transform: translateY(100px); opacity: 0; transition: all 0.3s; }

        .toast.success { background: var(--accent); }

</head>

</div>

let news = [];
let currentCategory = 'all';
let editingId = null;

// ─── Init ───
function init() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
        try {
            news = JSON.parse(stored);
        } catch {
            news = DEFAULT_NEWS;
        }
    } else {
        news = DEFAULT_NEWS;
        saveNewsToStorage();
    }
    handleRoute();
    window.addEventListener('hashchange', handleRoute);
}

// ─── Routing ───
function handleRoute() {
    const hash = window.location.hash;
    if (hash.startsWith('#/news/')) {
        const id = parseInt(hash.split('/')[2]);
        showDetail(id);
    } else {
        goHome();
    }
}

// ─── Render Cards ───
function renderCards() {
    const grid = document.getElementById('newsGrid');
    const empty = document.getElementById('emptyState');
    const search = document.getElementById('searchInput').value.toLowerCase().trim();

    let filtered = news.filter(n => {
        const matchCat = currentCategory === 'all' || n.category === currentCategory;
        const matchSearch = !search || n.title.toLowerCase().includes(search) || n.summary.toLowerCase().includes(search);
        return matchCat && matchSearch;
    });

    if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    // Sort by date descending
    filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

    const tagLabels = { tech: '科技', product: '產品', market: '市場', trend: '趨勢' };
    const tagClass = { tech: 'tech', product: 'product', market: 'market', trend: 'trend' };

    grid.innerHTML = filtered.map(n => `
        <div class="news-card" onclick="navigateTo(${n.id})">
            <div class="news-card-img">
                ${n.image ? `<img src="${n.image}" alt="${n.title}" onerror="this.style.display='none';this.parentElement.innerHTML='📰'">` : '📰'}
            </div>
            <div class="news-card-body">
                <div class="news-card-meta">
                    <span class="news-card-tag ${tagClass[n.category]}">${tagLabels[n.category]}</span>
                    <span class="news-card-date">${n.date}</span>
                </div>
                <div class="news-card-title">${n.title}</div>
                <div class="news-card-summary">${n.summary}</div>
                <div class="news-card-footer">
                    <span class="news-card-source">${n.source || '市場研究論壇'}</span>
                    <span class="news-card-readmore">閱讀全文 →</span>
                </div>
            </div>
        </div>
    `).join('');
}

// ─── Navigation ───
function navigateTo(id) {
    window.location.hash = `#/news/${id}`;
}

function goHome() {
    window.location.hash = '';
    document.getElementById('view-home').classList.add('active');
    document.getElementById('view-detail').classList.remove('active');
    currentCategory = 'all';
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    document.querySelector('.filter-tag[data-cat="all"]').classList.add('active');
    renderCards();
}

function showDetail(id) {
    const n = news.find(x => x.id === id);
    if (!n) { goHome(); return; }

    document.getElementById('view-home').classList.remove('active');
    document.getElementById('view-detail').classList.add('active');

    const tagLabels = { tech: '科技', product: '產品', market: '市場', trend: '趨勢' };
    const content = n.content || `<p>${n.summary}</p>`;

    document.getElementById('detailContent').innerHTML = `
        <div class="detail-hero-img">
            ${n.image ? `<img src="${n.image}" alt="${n.title}" onerror="this.style.display='none';this.parentElement.innerHTML='📰'">` : '📰'}
        </div>
        <h1 class="detail-title">${n.title}</h1>
        <div class="detail-meta">
            <span class="news-card-tag news-card-tag.${n.category}" style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--${n.category === 'tech' ? 'primary' : n.category === 'product' ? 'purple' : n.category === 'market' ? 'accent' : 'warning'})22;color:var(--${n.category === 'tech' ? 'primary' : n.category === 'product' ? 'purple' : n.category === 'market' ? 'accent' : 'warning'})">${tagLabels[n.category]}</span>
            <span class="detail-date">📅 ${n.date}</span>
            <span class="detail-source">🏢 ${n.source || '市場研究論壇'}</span>
            ${n.author ? `<span class="detail-author">👤 ${n.author}</span>` : ''}
        </div>
        <div class="detail-body">${content}</div>
        ${n.tags && n.tags.length ? `<div class="detail-tags">${n.tags.map(t => `<span class="detail-tag"># ${t}</span>`).join('')}</div>` : ''}
    `;
}

// ─── Category Filter ───
function setCategory(btn) {
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat;
    renderCards();
}

// ─── Modal ───
function showAddModal(id) {
    editingId = id || null;
    document.getElementById('modalTitle').textContent = id ? '編輯新聞' : '新增新聞';
    document.getElementById('deleteBtn').style.display = id ? 'block' : 'none';

    if (id) {
        const n = news.find(x => x.id === id);
        document.getElementById('editId').value = id;
        document.getElementById('fTitle').value = n.title;
        document.getElementById('fSummary').value = n.summary;
        document.getElementById('fContent').value = n.content || '';
        document.getElementById('fImage').value = n.image || '';
        document.getElementById('fCategory').value = n.category;
        document.getElementById('fSource').value = n.source || '';
        document.getElementById('fAuthor').value = n.author || '';
        document.getElementById('fDate').value = n.date;
    } else {
        document.getElementById('editId').value = '';
        ['fTitle','fSummary','fContent','fImage','fSource','fAuthor'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('fCategory').value = 'tech';
        document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    }

    document.getElementById('newsModal').classList.add('show');
}

function closeModal() {
    document.getElementById('newsModal').classList.remove('show');
    editingId = null;
}

function saveNews() {
    const title = document.getElementById('fTitle').value.trim();
    const summary = document.getElementById('fSummary').value.trim();
    if (!title || !summary) { showToast('請填寫標題和摘要', 'error'); return; }

    const entry = {
        id: editingId || Date.now(),
        title,
        summary,
        content: document.getElementById('fContent').value.trim() || summary,
        image: document.getElementById('fImage').value.trim(),
        category: document.getElementById('fCategory').value,
        source: document.getElementById('fSource').value.trim(),
        author: document.getElementById('fAuthor').value.trim(),
        date: document.getElementById('fDate').value || new Date().toISOString().split('T')[0],
        tags: []
    };

    if (editingId) {
        const idx = news.findIndex(n => n.id === editingId);
        if (idx !== -1) news[idx] = entry;
    } else {
        news.unshift(entry);
    }

    saveNewsToStorage();
    closeModal();
    renderCards();
    showToast(editingId ? '新聞已更新' : '新聞已新增', 'success');
}

function deleteNews() {
    if (!editingId) return;
    if (!confirm('確定要刪除這篇新聞？')) return;
    news = news.filter(n => n.id !== editingId);
    saveNewsToStorage();
    closeModal();
    goHome();
    showToast('新聞已刪除', 'success');
}

function saveNewsToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(news));
}

// ─── Toast ───
function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ' ' + type : '');
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── Init ───
init();
</script>
</body>
</html>
