<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市場調查工具 - Market Research</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0071e3; --accent: #34c759; --danger: #ff3b30; --warning: #ff9500; --text: #1d1d1f; --text2: #86868b; --bg: #f5f5f7; --card: #fff; --border: #d2d2d7; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text2); margin-top: 8px; }
        
        .card { background: var(--card); border-radius: 20px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        
        .search-box { display: flex; gap: 12px; margin-bottom: 16px; }
        .search-box input { flex: 1; padding: 14px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; }
        .search-box input:focus { outline: none; border-color: var(--primary); }
        
        .platforms { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .platform-btn { padding: 8px 16px; background: var(--bg); border: 2px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .platform-btn:hover { border-color: var(--primary); }
        .platform-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #fff; }
        
        /* Results */
        .result-section { display: none; }
        .result-section.show { display: block; }
        
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        .pain-points, .positive { padding: 16px; border-radius: 12px; margin-bottom: 12px; }
        .pain-points { background: rgba(255,59,48,0.1); }
        .positive { background: rgba(52,199,89,0.1); }
        
        .item { padding: 10px; background: var(--card); border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
        
        .sentiment-bar { height: 24px; background: var(--border); border-radius: 12px; overflow: hidden; margin: 16px 0; }
        .sentiment-fill { height: 100%; background: linear-gradient(90deg, var(--danger), var(--warning), var(--accent)); width: 0%; transition: width 0.5s; }
        .sentiment-score { text-align: center; font-size: 24px; font-weight: 700; }
        
        .links { background: var(--bg); border-radius: 12px; padding: 16px; }
        .links a { display: block; padding: 8px 0; color: var(--primary); text-decoration: none; font-size: 14px; }
        .links a:hover { text-decoration: underline; }
        .preset-grid, .history-list { display:grid; gap:10px; }
        .preset-btn { text-align:left; padding:12px 14px; border:1px solid var(--border); background:#fff; border-radius:12px; cursor:pointer; }
        .preset-btn:hover { border-color: var(--primary); }
        .note-box { padding:16px; background: rgba(0,113,227,0.06); border-radius:12px; font-size:14px; line-height:1.7; }
        .brief-box { white-space:pre-wrap; background:var(--bg); border-radius:12px; padding:16px; font-size:14px; line-height:1.8; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab { flex: 1; padding: 12px; background: var(--bg); border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }
        .tab.active { background: var(--primary); color: #fff; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>市場調查工具</h1>
            <p>搜尋論壇社群，分析消費者痛點</p>
        </div>
        
        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('search')">🔍 搜尋</button>
                <button class="tab" onclick="switchTab('results')">📊 結果</button>
            </div>
            
            <div class="tab-content active" id="tab-search">
                <input type="text" id="keyword" placeholder="輸入關鍵字，例如：文字轉語音、TTS app、有聲書..." style="width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;font-size:16px;margin-bottom:16px;">

                <div style="font-size:14px;font-weight:600;margin-bottom:8px;">常用研究預設：</div>
                <div class="preset-grid" style="margin-bottom:16px;">
                    <button class="preset-btn" onclick="applyPreset('pain')">Pain Hunt：找抱怨 / 負評 / 替代品需求</button>
                    <button class="preset-btn" onclick="applyPreset('comparison')">Comparison：找比較文 / alternatives / vs</button>
                    <button class="preset-btn" onclick="applyPreset('buying')">Buying Intent：找購買意圖 / 推薦請求</button>
                </div>
                
                <div style="font-size:14px;font-weight:600;margin-bottom:8px;">選擇平台：</div>
                <div class="platforms">
                    <button class="platform-btn selected" data-platform="ptt" onclick="togglePlatform(this)">PTT</button>
                    <button class="platform-btn selected" data-platform="dcard" onclick="togglePlatform(this)">Dcard</button>
                    <button class="platform-btn selected" data-platform="reddit" onclick="togglePlatform(this)">Reddit</button>
                    <button class="platform-btn selected" data-platform="mobile01" onclick="togglePlatform(this)">Mobile01</button>
                    <button class="platform-btn" data-platform="trustpilot" onclick="togglePlatform(this)">Trustpilot</button>
                    <button class="platform-btn" data-platform="g2" onclick="togglePlatform(this)">G2</button>
                </div>
                
                <button class="btn btn-primary" onclick="startResearch()">開始市場調查</button>
                <button class="btn" style="margin-top:10px;background:#111827;color:#fff;" onclick="saveResearchSession()">保存這次研究 Session</button>
            </div>
            
            <div class="tab-content" id="tab-results">
                <div id="resultsContent">
                    <div style="text-align:center;padding:40px;color:var(--text2)">請先進行搜尋</div>
                </div>
                <div style="margin-top:16px;" class="note-box">
                    這個工具目前是 research workspace：幫你快速建立搜尋入口、痛點框架、研究 brief 與 session 保存。下一階段若接 API，可自動抓取與摘要真實內容。
                </div>
                <div style="margin-top:16px;">
                    <div class="section-title">🗂️ 已保存的 Research Sessions</div>
                    <div id="historyList" class="history-list"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const STORAGE_KEY = 'market-research-sessions-v1';
        const PLATFORMS = {
            ptt: { name: "PTT", search: "https://www.google.com/search?q=site:ptt.cc {keyword}" },
            dcard: { name: "Dcard", search: "https://www.google.com/search?q=site:dcard.tw {keyword}" },
            reddit: { name: "Reddit", search: "https://www.reddit.com/search/?q={keyword}" },
            mobile01: { name: "Mobile01", search: "https://www.google.com/search?q=site:mobile01.com {keyword}" },
            trustpilot: { name: "Trustpilot", search: "https://www.trustpilot.com/search?query={keyword}" },
            g2: { name: "G2", search: "https://www.g2.com/search?query={keyword}" }
        };
        
        const state = { lastResearch: null, sessions: loadSessions() };

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (window.event?.target?.classList?.contains('tab')) {
                window.event.target.classList.add('active');
            } else {
                document.querySelector(`.tab[onclick*="${tab}"]`)?.classList.add('active');
            }
            document.getElementById('tab-' + tab).classList.add('active');
        }

        function loadSessions() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
            catch { return []; }
        }

        function persistSessions() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.sessions));
        }

        function applyPreset(type) {
            const keyword = document.getElementById('keyword');
            const current = keyword.value.trim();
            if (!current) {
                alert('請先輸入主題關鍵字');
                return;
            }
            if (type === 'pain') keyword.value = `${current} 痛點 抱怨 缺點 替代`; 
            if (type === 'comparison') keyword.value = `${current} alternative vs 比較 推薦`; 
            if (type === 'buying') keyword.value = `${current} 推薦 值得買 評價`; 
        }
        
        function togglePlatform(btn) {
            btn.classList.toggle('selected');
        }
        
        function getSelectedPlatforms() {
            return Array.from(document.querySelectorAll('.platform-btn.selected')).map(b => b.dataset.platform);
        }
        
        function startResearch() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) {
                alert('請輸入關鍵字');
                return;
            }
            
            const platforms = getSelectedPlatforms();
            if (platforms.length === 0) {
                alert('請選擇至少一個平台');
                return;
            }
            
            // 生成搜尋連結
            let linksHtml = '<div class="links"><div style="font-weight:600;margin-bottom:12px;">🔗 搜尋連結：</div>';
            
            platforms.forEach(pf => {
                if (PLATFORMS[pf]) {
                    const url = PLATFORMS[pf].search.replace('{keyword}', encodeURIComponent(keyword));
                    linksHtml += `<a href="${url}" target="_blank">📱 ${PLATFORMS[pf].name} - 搜尋 ${keyword}</a>`;
                }
            });
            linksHtml += '</div>';
            
            // 模擬分析結果（實際需要 AI API）
            const painPoints = [
                `${keyword} 價格是否偏高？`,
                `${keyword} 是否缺少關鍵功能或整合？`,
                `${keyword} 速度 / 品質 / 穩定性是否被抱怨？`,
                `${keyword} 是否缺少 mobile / offline / collaboration 能力？`,
                `${keyword} 是否存在學習成本或 onboarding 問題？`
            ];
            
            const positives = [
                `${keyword} 是否有明確價值主張`,
                `${keyword} 是否有使用者認為省時省力`,
                `${keyword} 是否有特定場景特別被稱讚`,
                `${keyword} 是否有定價或免費方案優勢`,
                `${keyword} 是否有介面或速度優勢`
            ];
            
            const sentiment = Math.max(35, Math.min(78, 55 + (platforms.length * 3) - Math.floor(keyword.length / 6)));
            
            const researchBrief = buildResearchBrief(keyword, platforms, painPoints, positives, sentiment);
            state.lastResearch = { keyword, platforms, painPoints, positives, sentiment, brief: researchBrief, createdAt: new Date().toISOString() };

            const resultsHtml = `
                <div class="section-title">📈 情感分析</div>
                <div class="sentiment-bar">
                    <div class="sentiment-fill" style="width: ${sentiment}%"></div>
                </div>
                <div class="sentiment-score">${sentiment}/100 <span style="font-size:14px;font-weight:400;color:var(--text2)">${sentiment > 60 ? '正面較多' : sentiment > 40 ? '中性' : '負面較多'}</span></div>
                
                <div class="section-title" style="margin-top:24px">❌ 消費者痛點 (${painPoints.length})</div>
                <div class="pain-points">
                    ${painPoints.map(p => `<div class="item">⚠️ ${p}</div>`).join('')}
                </div>
                
                <div class="section-title">✅ 正面評價 (${positives.length})</div>
                <div class="positive">
                    ${positives.map(p => `<div class="item">✨ ${p}</div>`).join('')}
                </div>
                
                <div class="section-title" style="margin-top:24px">💡 建議</div>
                <div class="item">
                    <strong>1. 定價策略：</strong>先驗證使用者最常抱怨的價格 / 功能缺口<br>
                    <strong>2. 功能改進：</strong>聚焦最常見 workflow friction 與 missing feature<br>
                    <strong>3. 品質提升：</strong>記錄品質、速度、穩定性相關抱怨比例<br>
                    <strong>4. 產品定位：</strong>區分你是在做替代品、升級版，還是垂直場景工具
                </div>

                <div class="section-title" style="margin-top:24px">🧠 Research Brief</div>
                <div class="brief-box">${researchBrief}</div>
                
                ${linksHtml}
                
                <div style="margin-top:24px">
                    <button class="btn btn-primary" onclick="window.open('${PLATFORMS[platforms[0]].search.replace('{keyword}', encodeURIComponent(keyword))}', '_blank')">前往搜尋結果</button>
                </div>
            `;
            
            document.getElementById('resultsContent').innerHTML = resultsHtml;
            renderHistory();
            switchTab('results');
        }

        function buildResearchBrief(keyword, platforms, painPoints, positives, sentiment) {
            return [
                `研究主題：${keyword}`,
                `平台：${platforms.map(p => PLATFORMS[p]?.name || p).join(' / ')}`,
                `情感分數：${sentiment}/100`,
                '',
                '核心假設：',
                `- 使用者正在尋找 ${keyword} 的更好替代方案或更明確價值。`,
                '',
                '優先驗證的痛點：',
                ...painPoints.map((p, i) => `${i + 1}. ${p}`),
                '',
                '可追問的正向訊號：',
                ...positives.map((p, i) => `${i + 1}. ${p}`),
            ].join('\n');
        }

        function saveResearchSession() {
            if (!state.lastResearch) {
                alert('請先完成一次市場調查');
                return;
            }
            state.sessions.unshift({ id: Date.now(), ...state.lastResearch });
            state.sessions = state.sessions.slice(0, 20);
            persistSessions();
            renderHistory();
            switchTab('results');
        }

        function renderHistory() {
            const el = document.getElementById('historyList');
            if (!state.sessions.length) {
                el.innerHTML = '<div class="item">尚未保存任何 research session</div>';
                return;
            }
            el.innerHTML = state.sessions.map(session => `
                <div class="item">
                    <strong>${escapeHtml(session.keyword)}</strong><br>
                    <span style="color:var(--text2);font-size:12px;">${new Date(session.createdAt).toLocaleString('zh-TW')}｜${escapeHtml(session.platforms.join(', '))}</span><br>
                    <div style="margin-top:8px;white-space:pre-wrap;">${escapeHtml(session.brief.split('\n').slice(0,6).join('\n'))}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        renderHistory();
    </script>
</body>
</html>
